{% extends 'base.html' %}
{% block title %}Edit Parking Lot{% endblock %}
{% block content %}
<div class="container">
  <h4>Edit Parking Lot - {{ lot.name }}</h4>
  <a href="{{ url_for('admin.manage_parking') }}" class="btn btn-secondary mb-3">← Back to Parking Management</a>

  <form method="POST">
    <div class="mb-3">
      <label>Name</label>
      <input name="name" class="form-control" value="{{ lot.name }}" required>
    </div>
    <div class="mb-3">
      <label>Address</label>
      <input name="address" class="form-control" value="{{ lot.address }}" required>
    </div>
    <div class="mb-3">
      <label>Pin Code</label>
      <input name="pin_code" class="form-control" value="{{ lot.pin_code }}" required>
    </div>
    <div class="mb-3">
      <label>Price per Hour</label>
      <input name="price_per_hour" type="number" step="0.01" class="form-control" value="{{ lot.price_per_hour }}" required>
    </div>
    <div class="mb-3">
      <label>Total Number of Spots</label>
      <input name="max_spots" type="number" min="0" class="form-control" value="{{ lot.max_spots }}" required>
    </div>
    <button class="btn btn-primary">Update</button>
  </form>
</div>
{% endblock %}
