{% extends 'base.html' %}
{% block title %}Edit User Profile{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">Edit User: {{ user.full_name }}</h2>

  <form method="POST">
    <div class="mb-3">
      <label for="name" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="name" name="name" value="{{ user.full_name }}" required>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email (readonly)</label>
      <input type="email" class="form-control" id="email" value="{{ user.email }}" readonly>
    </div>

    <div class="mb-3">
      <label for="phone" class="form-label">Phone</label>
      <input type="text" class="form-control" id="phone" name="phone" value="{{ user.phone }}">
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Address</label>
      <input type="text" class="form-control" id="address" name="address" value="{{ user.address }}">
    </div>

    <div class="mb-3">
      <label for="pin_code" class="form-label">Pin Code</label>
      <input type="text" class="form-control" id="pin_code" name="pin_code" value="{{ user.pin_code }}">
    </div>

    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{{ url_for('admin.view_users') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
