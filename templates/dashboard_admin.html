{% extends 'base.html' %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Welcome, Admin!</h2>

    <div class="row g-3">
        <!-- Manage Parking Lots -->
        <div class="col-md-3">
            <div class="d-grid">
                <a href="{{ url_for('admin.manage_parking') }}" class="btn btn-success btn-lg">Manage Parking Lots</a>
            </div>
        </div>

        <!-- View Users -->
        <div class="col-md-3">
            <div class="d-grid">
                <a href="{{ url_for('admin.view_users') }}" class="btn btn-info btn-lg">View Users</a>
            </div>
        </div>

        <!-- Search -->
        <div class="col-md-3">
            <div class="d-grid">
                <a href="{{ url_for('admin.admin_search') }}" class="btn btn-primary btn-lg">Search</a>
            </div>
        </div>


        <div class="col-md-3">
            <div class="d-grid">
                <a href="{{ url_for('admin.admin_summary') }}" class="btn btn-secondary btn-lg">Summary</a>
            </div>
        </div>
        <div class="col-md-4">
            
        </div>
        
        <div class="col-md-4">
            <div class="d-grid">
                <a href="{{ url_for('auth.logout') }}" class="btn btn-danger btn-lg">Logout</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
