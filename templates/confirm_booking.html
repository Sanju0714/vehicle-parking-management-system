{% extends 'base.html' %}
{% block title %}Confirm Booking{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Confirm Your Booking</h2>
  <form method="POST">
    <div class="mb-3">
      <label>User ID:</label>
      <input type="text" class="form-control" value="{{ user_id }}" readonly>
    </div>
    <div class="mb-3">
      <label>Lot Name:</label>
      <input type="text" class="form-control" value="{{ lot.name }} ({{ lot.location }})" readonly>
    </div>
    <div class="mb-3">
      <label>Spot Number:</label>
      <input type="text" class="form-control" value="{{ spot.spot_number }}" readonly>
    </div>
    <div class="mb-3">
      <label for="vehicle_number">Vehicle Number:</label>
      <input type="text" name="vehicle_number" id="vehicle_number" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Confirm Booking</button>
    <a href="{{ url_for('user.user_dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
